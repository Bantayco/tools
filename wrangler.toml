# Cloudflare Pages configuration.
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/
name = "tools"
pages_build_output_dir = "."
compatibility_date = "2025-06-01"

# KV namespace bound into every Function as env.GUIDES.
# Create it once, then paste the id here:
#   npx wrangler kv namespace create GUIDES
[[kv_namespaces]]
binding = "GUIDES"
id = "a05046a9fc644a379e71dc81fc44ba76"

# Non-secret config for verifying the Cloudflare Access JWT.
# ACCESS_AUD is the "Application Audience (AUD) Tag" from your Access app.
[vars]
ACCESS_TEAM_DOMAIN = "https://bantay.cloudflareaccess.com"
ACCESS_AUD = "3ca7f219a065a95753c362e747a4e2fe77c4a1e36a5d4a25f3929db4b628ed2c"

# --- Local dev ---------------------------------------------------------------
# `wrangler pages dev` has no Access in front, so the middleware reads DEV_USER
# to act as a fixed identity. Put it in .dev.vars (gitignored, auto-loaded):
#   echo 'DEV_USER=dev@local' > .dev.vars
#   npx wrangler pages dev . --kv GUIDES
# Pages only supports `preview`/`production` named environments — there is no
# [env.dev], which is why DEV_USER lives in .dev.vars rather than here.
