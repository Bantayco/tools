<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bantay Tools</title>
    <link rel="stylesheet" href="/_shared/tokens.css">
    <link rel="stylesheet" href="/_shared/base.css">
    <style>
      .wrap { max-width: 820px; margin: 0 auto; padding: 56px 22px 80px; }
      header h1 { font-size: 32px; }
      header p { margin-top: 8px; color: var(--bantay-muted); }
      h2 {
        margin: 40px 0 14px;
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--bantay-muted);
      }
      .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
      a.card {
        display: block; padding: 18px 20px; text-decoration: none; color: inherit;
        background: var(--bantay-surface); border-radius: var(--bantay-radius);
        border: 1px solid color-mix(in srgb, var(--bantay-muted) 22%, transparent);
      }
      a.card:hover { border-color: var(--bantay-primary); }
      a.card strong { display: block; color: var(--bantay-primary); }
      a.card span { color: var(--bantay-muted); font-size: 14px; }

      .files { display: grid; gap: 8px; }
      a.file {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 16px; text-decoration: none; color: inherit;
        background: var(--bantay-surface); border-radius: var(--bantay-radius);
        border: 1px solid color-mix(in srgb, var(--bantay-muted) 18%, transparent);
      }
      a.file:hover { border-color: var(--bantay-primary); }
      a.file .title { font-weight: 600; }
      a.file .badge {
        font-size: 12px; padding: 2px 8px; border-radius: 999px;
        background: color-mix(in srgb, var(--bantay-primary) 12%, var(--bantay-surface));
        color: var(--bantay-primary);
      }
      a.file .when { margin-left: auto; color: var(--bantay-muted); font-size: 13px; }
      .note { color: var(--bantay-muted); font-size: 14px; padding: 8px 2px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Bantay Tools</h1>
        <p>Your files, and a place to start new ones.</p>
      </header>

      <h2>Start something new</h2>
      <section id="newTools" class="cards"></section>

      <h2>Your files</h2>
      <section id="files" class="files">
        <p class="note">Loading…</p>
      </section>
    </div>

    <script type="module" src="./home.js"></script>
  </body>
</html>
